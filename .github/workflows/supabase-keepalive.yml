name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 * * 1,5'  # Lunes y Viernes 9:00 AM UTC
  workflow_dispatch:        # Permite ejecutar manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Heartbeat
        run: |
          node -e "
          const https = require('https');
          const url = new URL(process.env.VITE_SUPABASE_URL + '/rest/v1/heartbeat');
          const options = {
            hostname: url.hostname,
            path: url.pathname,
            method: 'POST',
            headers: {
              'apikey': process.env.VITE_SUPABASE_ANON_KEY,
              'Authorization': 'Bearer ' + process.env.VITE_SUPABASE_ANON_KEY,
              'Content-Type': 'application/json'
            }
          };
          const req = https.request(options, res => {
            console.log('Status:', res.statusCode, 'Date:', new Date().toISOString());
            process.exit(res.statusCode < 400 ? 0 : 1);
          });
          req.on('error', e => { console.error('Error:', e.message); process.exit(1); });
          req.write(JSON.stringify({}));
          req.end();
          "
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
